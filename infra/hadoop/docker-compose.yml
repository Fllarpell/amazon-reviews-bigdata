name: reviewhdfs

services:
  namenode:
    image: apache/hadoop:3
    platform: linux/amd64
    hostname: namenode
    ports:
      - "9870:9870"
      - "8020:8020"
    command: ["hdfs", "namenode"]
    env_file:
      - ./hadoop.env
    environment:
      ENSURE_NAMENODE_DIR: "/tmp/hadoop-root/dfs/name"

  datanode:
    image: apache/hadoop:3
    platform: linux/amd64
    command: ["hdfs", "datanode"]
    env_file:
      - ./hadoop.env
    depends_on:
      - namenode

  resourcemanager:
    image: apache/hadoop:3
    platform: linux/amd64
    hostname: resourcemanager
    ports:
      - "8088:8088"
    command: ["yarn", "resourcemanager"]
    env_file:
      - ./hadoop.env
    depends_on:
      - datanode

  nodemanager:
    image: apache/hadoop:3
    platform: linux/amd64
    command: ["yarn", "nodemanager"]
    env_file:
      - ./hadoop.env
    depends_on:
      - resourcemanager
