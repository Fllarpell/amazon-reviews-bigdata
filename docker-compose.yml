services:
  citus:
    image: citusdata/citus:12.1.6
    container_name: "${CITUS_CONTAINER_NAME:-review_pipeline_citus}"
    ports:
      - "${COORDINATOR_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_HOST_AUTH_METHOD: "${POSTGRES_HOST_AUTH_METHOD:-trust}"
      APP_DB_USER: "${APP_DB_USER:-pipeline_app}"
      APP_DB_NAME: "${APP_DB_NAME:-review_analytics}"
    volumes:
      - citus_data:/var/lib/postgresql/data
      - ./infra/docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  citus_data:
